<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статистика USB - 2 Колонки</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #020606;
            --row-border: #0a1111;
            --accent-cyan: #00f2ff;
            --text-white: #ffffff;
            --text-gray: #7a8a8a;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: 'Roboto Condensed', sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* Контейнер для двох колонок */
        .stats-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 40px; /* Відступ між лівою та правою колонками */
            justify-content: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .stats-column {
            flex: 1;
            min-width: 320px;
            max-width: 550px;
        }

        /* Шапка кожної колонки */
        .table-header {
            display: grid;
            grid-template-columns: 1fr 140px;
            padding: 8px 0;
            border-bottom: 1px solid var(--row-border);
            color: var(--accent-cyan);
            font-size: 12px;
            font-weight: bold;
            text-align: right;
            text-transform: lowercase;
        }

        /* Рядок даних */
        .data-row {
            display: grid;
            grid-template-columns: 35px 1fr 65px 65px;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--row-border);
        }

        .icon-cell {
            display: flex;
            justify-content: center;
            filter: drop-shadow(0 0 3px var(--accent-cyan));
        }

        .label-cell {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .value-cell {
            text-align: center;
            font-size: 18px;
            font-weight: 700;
        }

        .val-total { color: var(--text-white); }
        .val-destroyed { color: var(--text-gray); }

        #status-msg {
            text-align: center;
            color: var(--accent-cyan);
            width: 100%;
            padding: 20px;
            letter-spacing: 2px;
        }

        @media (max-width: 768px) {
            .stats-wrapper { flex-direction: column; align-items: center; }
            .stats-column { width: 100%; }
        }
    </style>
</head>
<body>

    <div id="status-msg">СИНХРОНІЗАЦІЯ ДАНИХ...</div>

    <div class="stats-wrapper" id="main-wrapper" style="display: none;">
        <div class="stats-column">
            <div class="table-header">
                <div></div>
                <div>уражено в т.ч. знищено</div>
            </div>
            <div id="col-left"></div>
        </div>

        <div class="stats-column">
            <div class="table-header">
                <div></div>
                <div>уражено в т.ч. знищено</div>
            </div>
            <div id="col-right"></div>
        </div>
    </div>

    <script>
        async function fetchData() {
            const sheetId = '19JMsWCfWtKZ1bqISDD4WGfV9WUvAtZI8HEgfszI8UAk';
            const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

            try {
                const response = await fetch(url);
                const text = await response.text();
                const json = JSON.parse(text.substring(47).slice(0, -2));
                const rows = json.table.rows;
                
                const colLeft = document.getElementById('col-left');
                const colRight = document.getElementById('col-right');
                
                document.getElementById('status-msg').style.display = 'none';
                document.getElementById('main-wrapper').style.display = 'flex';

                // Рахуємо, скільки елементів відправити в кожну колонку
                const half = Math.ceil(rows.length / 2);

                rows.forEach((row, index) => {
                    // Колонки в Google Sheets: B=c[1], C=c[2], D=c[3]
                    const label     = row.c[1] ? row.c[1].v : '—';
                    const hit       = row.c[2] ? row.c[2].v : '0';
                    const destroyed = row.c[3] ? row.c[3].v : '0';

                    const rowHtml = `
                        <div class="data-row">
                            <div class="icon-cell">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent-cyan)" stroke-width="2">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <path d="M12 8v8M8 12h8"></path>
                                </svg>
                            </div>
                            <div class="label-cell">${label}</div>
                            <div class="value-cell val-total">${hit}</div>
                            <div class="value-cell val-destroyed">${destroyed}</div>
                        </div>
                    `;

                    // Розподіляємо по колонках
                    if (index < half) {
                        colLeft.innerHTML += rowHtml;
                    } else {
                        colRight.innerHTML += rowHtml;
                    }
                });
            } catch (e) {
                document.getElementById('status-msg').innerText = 'ПОМИЛКА ДОСТУПУ';
            }
        }

        window.onload = fetchData;
    </script>
</body>
</html>
