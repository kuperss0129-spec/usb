<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗВІТ ББпС 125 ОВМБр</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700&family=Oswald:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #020606;
            --row-border: #0a1111;
            --accent-cyan: #00f2ff;
            --text-white: #ffffff;
            --text-gray: #7a8a8a;
        }

        html, body {
            max-width: 100%;
            overflow-x: hidden; /* ПРИБИРАЄМО ГОРИЗОНТАЛЬНУ ПРОКРУТКУ */
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: 'Roboto Condensed', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Універсальне правило для правильних розмірів */
        * {
            box-sizing: border-box;
        }

        header {
            width: 100%;
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid var(--row-border);
            background: linear-gradient(180deg, #051414 0%, var(--bg-dark) 100%);
        }

        h1 {
            font-family: 'Oswald', sans-serif;
            font-size: clamp(32px, 5vw, 48px);
            line-height: 1.1;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: 2px;
        }

        .title-white { color: var(--text-white); }
        .title-cyan { color: var(--accent-cyan); display: block; font-size: 0.8em; }

        .stats-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            justify-content: center;
            max-width: 1200px;
            width: 100%;
            padding: 40px 20px;
        }

        .stats-column {
            flex: 1;
            min-width: 300px; /* Трохи зменшив, щоб влізало на мобільні */
            max-width: 550px;
        }

        .table-header {
            display: grid;
            grid-template-columns: 1fr 140px;
            padding: 8px 0;
            border-bottom: 1px solid var(--row-border);
            color: var(--accent-cyan);
            font-size: 12px;
            font-weight: bold;
            text-align: right;
            text-transform: lowercase;
        }

        .data-row {
            display: grid;
            grid-template-columns: 35px 1fr 65px 65px;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--row-border);
        }

        .icon-cell {
            display: flex;
            justify-content: center;
            filter: drop-shadow(0 0 3px var(--accent-cyan));
        }

        .label-cell {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .value-cell {
            text-align: center;
            font-size: 20px;
            font-weight: 700;
        }

        .val-total { color: var(--text-white); }
        .val-destroyed { color: var(--text-gray); }

        #status-msg {
            padding: 60px;
            color: var(--accent-cyan);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .stats-wrapper { gap: 20px; padding: 20px 10px; }
            .stats-column { min-width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <h1>
            <span class="title-white">ЗВІТ ББпС</span>
            <span class="title-cyan">125 ОВМБр</span>
        </h1>
    </header>

    <div id="status-msg">СИНХРОНІЗАЦІЯ...</div>

    <div class="stats-wrapper" id="main-wrapper" style="display: none;">
        <div class="stats-column">
            <div class="table-header"><div></div><div>уражено в т.ч. знищено</div></div>
            <div id="col-left"></div>
        </div>
        <div class="stats-column">
            <div class="table-header"><div></div><div>уражено в т.ч. знищено</div></div>
            <div id="col-right"></div>
        </div>
    </div>

    <script>
        async function fetchData() {
            const sheetId = '19JMsWCfWtKZ1bqISDD4WGfV9WUvAtZI8HEgfszI8UAk';
            const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

            const monthsNames = [
                "Січень", "Лютий", "Березень", "Квітень", "Травень", "Червень",
                "Липень", "Серпень", "Вересень", "Жовтень", "Листопад", "Грудень"
            ];
            
            const now = new Date();
            const currentMonth = monthsNames[now.getMonth()];
            const currentYear = now.getFullYear();
            const searchString = `${currentMonth} ${currentYear}`;

            try {
                const response = await fetch(url);
                const text = await response.text();
                const jsonString = text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1);
                const json = JSON.parse(jsonString);
                const allRows = json.table.rows;

                // Фільтр: шукаємо збіг у колонці А (наприклад, "Березень 2026")
                const filteredRows = allRows.filter(row => {
                    if (!row.c || !row.c[0]) return false;
                    const v = row.c[0].v ? row.c[0].v.toString().trim() : "";
                    return v.toLowerCase() === searchString.toLowerCase();
                });

                const colLeft = document.getElementById('col-left');
                const colRight = document.getElementById('col-right');
                const status = document.getElementById('status-msg');
                const wrapper = document.getElementById('main-wrapper');

                if (filteredRows.length === 0) {
                    status.innerHTML = `НЕМАЄ ДАНИХ ЗА ${searchString.toUpperCase()}<br><small>Перевірте колонку A (має бути "${searchString}")</small>`;
                    return;
                }

                status.style.display = 'none';
                wrapper.style.display = 'flex';

                const half = Math.ceil(filteredRows.length / 2);

                filteredRows.forEach((row, index) => {
                    const label = (row.c[1] && row.c[1].v) ? row.c[1].v : '—';
                    const hit = (row.c[2] && row.c[2].v) ? row.c[2].v : '0';
                    const dest = (row.c[3] && row.c[3].v) ? row.c[3].v : '0';

                    const rowHtml = `
                        <div class="data-row">
                            <div class="icon-cell">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent-cyan)" stroke-width="2">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <path d="M12 8v8M8 12h8"></path>
                                </svg>
                            </div>
                            <div class="label-cell">${label}</div>
                            <div class="value-cell val-total">${hit}</div>
                            <div class="value-cell val-destroyed">${dest}</div>
                        </div>
                    `;

                    if (index < half) colLeft.innerHTML += rowHtml;
                    else colRight.innerHTML += rowHtml;
                });
            } catch (e) {
                document.getElementById('status-msg').innerText = 'ПОМИЛКА ДОСТУПУ';
            }
        }

        window.onload = fetchData;
    </script>
</body>
</html>
