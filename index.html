<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗВІТ ББпС 125 ОВМБр</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #020606;
            --bg-block: #0d1212;
            --bg-hover: #161d1d;
            --accent-main: rgb(249 148 23); 
            --text-white: #ffffff;
            --row-border: #0a1111;
            --header-h: 85px; 
            --font-main: 34px;
            --font-blocks: 22px;
        }

        html, body {
            max-width: 100%; overflow-x: hidden; background-color: var(--bg-dark);
            color: var(--text-white); font-family: 'Roboto Condensed', sans-serif;
            margin: 0; padding: 0;
        }

        body { display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        * { box-sizing: border-box; }

        /* --- HEADER --- */
        .top-nav {
            display: flex; align-items: stretch; background-color: var(--bg-dark);
            height: var(--header-h); width: 100%; border-bottom: 2px solid var(--row-border);
            padding: 0 25px; gap: 15px;
        }

        .nav-logo-section { display: flex; align-items: center; gap: 20px; padding-right: 25px; }
        .main-title { font-size: var(--font-main); letter-spacing: 0.5px; white-space: nowrap; }
        .title-accent { color: var(--accent-main); }

        .nav-blocks { display: flex; align-items: center; gap: 12px; flex-grow: 1; justify-content: flex-end; }

        .info-block {
            background-color: var(--bg-block); height: 62px; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            padding: 0 32px; min-width: 160px; font-size: var(--font-blocks);
            border-radius: 2px; cursor: pointer; transition: background 0.2s; border: none;
            color: var(--text-white); font-weight: 700; text-transform: uppercase;
        }

        .info-block:hover { background-color: var(--bg-hover); }
        .time-date { color: #ffffff; font-size: 17px; line-height: 1.2; text-align: center; pointer-events: none; }

        /* --- DROPDOWN --- */
        .dropdown-wrapper { position: relative; padding: 0 !important; }
        .dropdown-wrapper select {
            background: transparent; border: none; color: white; font-family: inherit;
            font-size: var(--font-blocks); font-weight: 700; appearance: none; cursor: pointer;
            padding: 0 55px 0 35px; width: 100%; height: 100%; outline: none; text-transform: uppercase;
            text-align: center;
        }
        .dropdown-wrapper::after {
            content: "▼"; font-size: 12px; color: var(--accent-main);
            position: absolute; right: 20px; pointer-events: none;
        }

        /* --- TOP STATS (Numbers Orange + Neon, Labels White) --- */
        .top-stats-container {
            display: flex; justify-content: center; gap: 10px; width: 100%;
            max-width: 1350px; margin-top: 15px; padding: 0 20px;
        }

        .stat-card {
            background-color: var(--bg-block); flex: 1; display: flex;
            justify-content: center; align-items: center; padding: 25px 20px; gap: 35px; border-radius: 2px;
        }

        .stat-item { text-align: center; position: relative; }
        .stat-item:not(:last-child)::after {
            content: ""; position: absolute; right: -17px; top: 20%; height: 60%; width: 1px; background-color: #222;
        }

        .stat-value { 
            font-size: 42px; font-weight: 700; display: block; margin-bottom: 4px; 
            color: var(--accent-main); /* Числа тепер помаранчеві */
            text-shadow: 0 0 12px rgba(249, 148, 23, 0.6); /* Насиченіше неонове світіння */
        }
        .stat-label { 
            color: var(--text-white); /* Підписи тепер білі */
            font-size: 14px; text-transform: lowercase; font-weight: 700; opacity: 0.9;
        }

        /* --- TABLE --- */
        .stats-wrapper {
            display: flex; flex-wrap: wrap; gap: 40px; justify-content: center;
            max-width: 1350px; width: 100%; margin: 30px auto; padding: 0 20px;
        }

        .stats-column { flex: 1; min-width: 320px; max-width: 650px; }
        .table-header {
            display: grid; grid-template-columns: 1fr 160px; padding-bottom: 8px;
            border-bottom: 1px solid var(--row-border); color: var(--accent-main);
            font-size: 13px; text-transform: lowercase; text-align: right;
        }

        .data-row {
            display: grid; grid-template-columns: 45px 1fr 75px 75px; align-items: center;
            padding: 14px 0; border-bottom: 1px solid var(--row-border);
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .check-icon { width: 18px; height: 18px; stroke: var(--accent-main); stroke-width: 3; fill: none; }
        .label-cell { font-size: 16px; text-transform: uppercase; font-weight: 700; }
        .value-cell { text-align: center; font-size: 22px; font-weight: 700; }
        .val-total { color: #fff; }
        .val-destroyed { color: #7a8a8a; }

        #status-msg { text-align: center; padding: 60px; color: var(--accent-main); text-transform: uppercase; font-size: 18px; }

        @media (max-width: 1100px) {
            .top-nav { height: auto; flex-direction: column; padding: 20px; gap: 15px; }
            .top-stats-container { flex-direction: column; }
            .nav-blocks { width: 100%; justify-content: center; flex-wrap: wrap; }
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="nav-logo-section">
            <svg width="40" height="40" viewBox="0 0 100 100" fill="white">
                <path d="M50 5L15 30V70L50 95L85 70V30L50 5ZM50 15L75 32V68L50 85L25 68V32L50 15Z"/>
            </svg>
            <div class="main-title">ЗВІТ ББпС <span class="title-accent">125 ОВМБр</span></div>
        </div>

        <div class="nav-blocks">
            <div class="info-block" onclick="renderAllTimeSum()" title="За весь час">
                <div id="clock" class="time-date">--:--:-- --<br>--.--.----</div>
            </div>
            <div class="info-block" onclick="renderCurrentMonth()"><span id="month-label">--</span></div>
            <div class="info-block dropdown-wrapper">
                <select id="period-select" onchange="renderData(this.value)">
                    <option value="" disabled selected>Минулий період</option>
                </select>
            </div>
        </div>
    </nav>

    <div class="top-stats-container" id="top-stats" style="display: none;">
        <div class="stat-card">
            <div class="stat-item"><span class="stat-value" id="total-hit">0</span><span class="stat-label">уражено цілей</span></div>
            <div class="stat-item"><span class="stat-value" id="total-dest">0</span><span class="stat-label">в т.ч. знищено</span></div>
        </div>
        <div class="stat-card">
            <div class="stat-item"><span class="stat-value" id="strike-sorties">0</span><span class="stat-label">ударних вильотів</span></div>
            <div class="stat-item"><span class="stat-value" id="recon-sorties">0</span><span class="stat-label">розвід. вильотів</span></div>
        </div>
        <div class="stat-card">
            <div class="stat-item"><span class="stat-value" id="personnel-hit">0</span><span class="stat-label">ОС РОВ</span></div>
            <div class="stat-item"><span class="stat-value" id="personnel-dest">0</span><span class="stat-label">в т.ч. знищено</span></div>
            <div class="stat-item"><span class="stat-value" id="personnel-wounded">0</span><span class="stat-label">в т.ч. поранено</span></div>
        </div>
    </div>

    <div id="status-msg">СИНХРОНІЗАЦІЯ...</div>

    <div class="stats-wrapper" id="main-wrapper" style="display: none;">
        <div class="stats-column">
            <div class="table-header"><div></div><div>уражено в т.ч. знищено</div></div>
            <div id="col-left"></div>
        </div>
        <div class="stats-column">
            <div class="table-header"><div></div><div>уражено в т.ч. знищено</div></div>
            <div id="col-right"></div>
        </div>
    </div>

    <script>
        const monthsNames = ["Січень", "Лютий", "Березень", "Квітень", "Травень", "Червень", "Липень", "Серпень", "Вересень", "Жовтень", "Листопад", "Грудень"];
        let allRowsData = [];
        const now = new Date();
        const currentSearchString = `${monthsNames[now.getMonth()]} ${now.getFullYear()}`;

        function updateClock() {
            const d = new Date(); const days = ['Нд','Пн','Вт','Ср','Чт','Пт','Сб'];
            document.getElementById('clock').innerHTML = `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}:${d.getSeconds().toString().padStart(2,'0')} ${days[d.getDay()]}<br>${d.getDate().toString().padStart(2,'0')}.${(d.getMonth()+1).toString().padStart(2,'0')}.${d.getFullYear()}`;
        }
        setInterval(updateClock, 1000); updateClock();

        function animateNumber(el, target) {
            let start = 0; const duration = 800; const startTime = performance.now();
            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const ease = progress * (2 - progress);
                el.textContent = Math.floor(ease * target).toLocaleString();
                if (progress < 1) requestAnimationFrame(update);
            }
            requestAnimationFrame(update);
        }

        async function fetchData() {
            const sheetId = '19JMsWCfWtKZ1bqISDD4WGfV9WUvAtZI8HEgfszI8UAk';
            const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;
            document.getElementById('month-label').textContent = monthsNames[now.getMonth()];
            
            try {
                const response = await fetch(url);
                const text = await response.text();
                const json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));
                
                allRowsData = json.table.rows.filter(row => {
                    const p = row.c[0]?.v; if (!p) return false;
                    const parts = p.split(' ');
                    const mIdx = monthsNames.indexOf(parts[0]);
                    const yNum = parseInt(parts[1]);
                    return yNum < now.getFullYear() || (yNum === now.getFullYear() && mIdx <= now.getMonth());
                });

                const select = document.getElementById('period-select');
                const pastPeriods = [...new Set(allRowsData.map(r => r.c[0]?.v))].filter(p => p !== currentSearchString);
                pastPeriods.sort((a, b) => {
                    const pA = a.split(' '); const pB = b.split(' ');
                    return (parseInt(pB[1]) - parseInt(pA[1])) || (monthsNames.indexOf(pB[0]) - monthsNames.indexOf(pA[0]));
                });

                pastPeriods.forEach(p => {
                    const opt = document.createElement('option'); opt.value = p; opt.textContent = p; select.appendChild(opt);
                });

                renderCurrentMonth();
            } catch (e) { document.getElementById('status-msg').innerText = 'ПОМИЛКА ТАБЛИЦІ'; }
        }

        function calculateTopStats(rows, filterValue) {
            let hits = 0, dests = 0, strike = 0, recon = 0, persDest = 0, persWound = 0;
            rows.forEach(row => {
                const label = row.c[1]?.v || "";
                const valC = parseInt(row.c[2]?.v) || 0;
                const valD = parseInt(row.c[3]?.v) || 0;
                hits += valC; dests += valD;
                if (label.includes("ОС РОВ")) { persDest = valD; persWound = valC; }
            });

            allRowsData.forEach(row => {
                const colF = row.c[5]?.v; 
                if (colF === filterValue || (filterValue === "ВСІ" && colF)) {
                    strike += (parseInt(row.c[6]?.v) || 0); recon += (parseInt(row.c[7]?.v) || 0);  
                }
            });

            animateNumber(document.getElementById('total-hit'), hits);
            animateNumber(document.getElementById('total-dest'), dests);
            animateNumber(document.getElementById('strike-sorties'), strike);
            animateNumber(document.getElementById('recon-sorties'), recon);
            animateNumber(document.getElementById('personnel-hit'), persDest + persWound); 
            animateNumber(document.getElementById('personnel-dest'), persDest);
            animateNumber(document.getElementById('personnel-wounded'), persWound);
        }

        function renderCurrentMonth() { renderData(currentSearchString); }
        function renderAllTimeSum() {
            const summary = {};
            allRowsData.forEach(row => {
                const label = row.c[1]?.v; if (!label) return;
                if (!summary[label]) summary[label] = { c: 0, d: 0 };
                summary[label].c += (parseInt(row.c[2]?.v) || 0);
                summary[label].d += (parseInt(row.c[3]?.v) || 0);
            });
            const rows = Object.keys(summary).map(k => ({ c: [null, {v: k}, {v: summary[k].c}, {v: summary[k].d}] }));
            display(rows, "ВСІ");
        }

        function renderData(filterValue) {
            const filtered = allRowsData.filter(r => r.c[0]?.v === filterValue);
            display(filtered, filterValue);
        }

        function display(rows, filterValue) {
            calculateTopStats(rows, filterValue);
            const colLeft = document.getElementById('col-left');
            const colRight = document.getElementById('col-right');
            colLeft.innerHTML = ''; colRight.innerHTML = '';

            if (rows.length === 0) {
                document.getElementById('status-msg').style.display = 'block';
                document.getElementById('main-wrapper').style.display = 'none';
                document.getElementById('top-stats').style.display = 'none';
                return;
            }

            document.getElementById('status-msg').style.display = 'none';
            document.getElementById('main-wrapper').style.display = 'flex';
            document.getElementById('top-stats').style.display = 'flex';

            const half = Math.ceil(rows.length / 2);
            rows.forEach((row, index) => {
                const v1 = parseInt(row.c[2]?.v) || 0;
                const v2 = parseInt(row.c[3]?.v) || 0;
                const html = `
                    <div class="data-row" style="animation-delay: ${index * 0.05}s">
                        <div class="icon-cell"><svg class="check-icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
                        <div class="label-cell">${row.c[1]?.v || '—'}</div>
                        <div class="value-cell val-total" id="v1-${index}">0</div>
                        <div class="value-cell val-destroyed" id="v2-${index}">0</div>
                    </div>`;
                if (index < half) colLeft.innerHTML += html; else colRight.innerHTML += html;
                setTimeout(() => {
                    const el1 = document.getElementById(`v1-${index}`);
                    const el2 = document.getElementById(`v2-${index}`);
                    if(el1) animateNumber(el1, v1);
                    if(el2) animateNumber(el2, v2);
                }, 100);
            });
        }
        window.onload = fetchData;
    </script>
</body>
</html>
