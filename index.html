<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Підрозділи | SBS Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
 
</head>
<body>
<div id="units-grid" class="units-container">
    <p>Завантаження підрозділів...</p>
</div>

<style>
    /* Стилізація під мілітарі-дизайн sbs-group */
    .units-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 25px;
        padding: 20px;
        background-color: #0f0f0f; /* Темний фон */
    }

    .unit-card {
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 4px;
        padding: 24px;
        text-align: center;
        transition: all 0.3s ease;
        text-decoration: none;
        color: white;
    }

    .unit-card:hover {
        border-color: #ffd700; /* Золотистий колір при наведенні */
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    }

    .unit-logo {
        width: 120px;
        height: 120px;
        object-fit: contain;
        margin-bottom: 20px;
    }

    .unit-name {
        font-family: 'Oswald', sans-serif; /* Якщо є цей шрифт */
        text-transform: uppercase;
        font-size: 1.2rem;
        margin-bottom: 12px;
        color: #fff;
    }

    .unit-desc {
        font-size: 0.9rem;
        color: #aaa;
        line-height: 1.5;
    }
</style>

<script>
    // Посилання на вашу опубліковану таблицю (формат CSV)
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTz_W1-O_H7H0vN9X-YkS_tJ9Q6p-v-DqXv_H4P-jD-fP_I9M-k/pub?output=csv';

    async function loadUnits() {
        try {
            const response = await fetch(csvUrl);
            const data = await response.text();
            
            // Розбиваємо CSV на рядки та колонки
            const rows = data.split('\n').slice(1); // пропускаємо заголовок
            const container = document.getElementById('units-grid');
            container.innerHTML = ''; 

            rows.forEach(row => {
                const columns = row.split(','); // Назва, Опис, Фото
                if (columns.length < 3) return;

                const name = columns[0].trim();
                const desc = columns[1].trim();
                const img = columns[2].trim();

                const cardHtml = `
                    <div class="unit-card">
                        <img src="${img}" alt="${name}" class="unit-logo">
                        <div class="unit-name">${name}</div>
                        <div class="unit-desc">${desc}</div>
                    </div>
                `;
                container.innerHTML += cardHtml;
            });
        } catch (error) {
            console.error('Помилка завантаження даних:', error);
            document.getElementById('units-grid').innerHTML = '<p>Не вдалося завантажити дані.</p>';
        }
    }

    loadUnits();
</script>


</body>
</html>
