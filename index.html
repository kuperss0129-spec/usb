<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗВІТ ББпС 125 ОВМБр</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700&family=Oswald:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #020606;
            --bg-panel: #0d1414;
            --row-border: #0a1111;
            --accent-cyan: #00f2ff;
            --text-white: #ffffff;
            --text-gray: #7a8a8a;
            --text-panel-gray: #b5cccc;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: 'Roboto Condensed', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- ВЕЛИКИЙ ЗАГОЛОВОК --- */
        .header-panel {
            width: 100%;
            background: linear-gradient(180deg, #051414 0%, var(--bg-dark) 100%);
            border-bottom: 1px solid var(--row-border);
            padding: 15px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-logo {
            width: 45px;
            height: 45px;
        }

        .header-title {
            font-family: 'Oswald', sans-serif; /* Масивний шрифт */
            font-size: 32px; /* Збільшений розмір */
            line-height: 1.0;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: 1px;
        }

        .title-white { color: var(--text-white); }
        .title-cyan { color: var(--accent-cyan); display: block; font-size: 28px; margin-top: 2px; }

        .header-right {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .header-block {
            background-color: var(--bg-panel);
            padding: 10px 18px;
            border-radius: 2px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 14px;
            color: var(--text-panel-gray);
            display: flex;
            justify-content: center;
            min-height: 48px;
            box-sizing: border-box;
            position: relative;
            border: 1px solid #1a2222;
        }

        .time-block {
            flex-direction: column;
            color: var(--accent-cyan);
            min-width: 110px;
            text-align: left;
            line-height: 1.2;
        }

        /* Стилізація селектора періодів */
        .dropdown-select {
            background: transparent;
            border: none;
            color: inherit;
            font-family: inherit;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            cursor: pointer;
            appearance: none;
            padding-right: 20px;
            outline: none;
            width: 100%;
        }

        .dropdown-block::after {
            content: "▼";
            font-size: 10px;
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: var(--accent-cyan);
        }

        /* --- СТАТИСТИКА --- */
        .stats-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            justify-content: center;
            max-width: 1200px;
            width: 100%;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .stats-column {
            flex: 1;
            min-width: 320px;
            max-width: 550px;
        }

        .table-header {
            display: grid;
            grid-template-columns: 1fr 140px;
            padding: 8px 0;
            border-bottom: 1px solid var(--row-border);
            color: var(--accent-cyan);
            font-size: 12px;
            font-weight: bold;
            text-align: right;
            text-transform: lowercase;
        }

        .data-row {
            display: grid;
            grid-template-columns: 35px 1fr 65px 65px;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--row-border);
        }

        .icon-cell {
            display: flex;
            justify-content: center;
            filter: drop-shadow(0 0 3px var(--accent-cyan));
        }

        .label-cell {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .value-cell {
            text-align: center;
            font-size: 20px;
            font-weight: 700;
        }

        .val-total { color: var(--text-white); }
        .val-destroyed { color: var(--text-gray); }

        #status-msg {
            padding: 60px;
            color: var(--accent-cyan);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        @media (max-width: 1000px) {
            .header-panel { flex-direction: column; gap: 20px; padding: 20px; }
            .header-title { text-align: center; font-size: 26px; }
            .title-cyan { font-size: 22px; }
            .header-right { width: 100%; justify-content: center; flex-wrap: wrap; }
        }
    </style>
</head>
<body>

    <header class="header-panel">
        <div class="header-left">
            <svg class="header-logo" viewBox="0 0 100 100" fill="white">
                <path d="M50 5L15 25V75L50 95L85 75V25L50 5ZM50 15L75 30V70L50 85L25 70V30L50 15Z"/>
            </svg>
            <h1 class="header-title">
                <span class="title-white">ЗВІТ ББпС</span>
                <span class="title-cyan">125 ОВМБр</span>
            </h1>
        </div>
        
        <div class="header-right">
            <div class="header-block time-block">
                <div id="header-time">00:00:00 --</div>
                <div id="header-date">00.00.0000</div>
            </div>
            
            <div class="header-block" id="current-month-display">---</div>

            <div class="header-block dropdown-block">
                <select id="period-selector" class="dropdown-select">
                    <option value="" disabled selected>Вибір періоду</option>
                </select>
            </div>
        </div>
    </header>

    <div id="status-msg">СИНХРОНІЗАЦІЯ ДАНИХ...</div>

    <div class="stats-wrapper" id="main-wrapper" style="display: none;">
        <div class="stats-column">
            <div class="table-header"><div></div><div>уражено в т.ч. знищено</div></div>
            <div id="col-left"></div>
        </div>
        <div class="stats-column">
            <div class="table-header"><div></div><div>уражено в т.ч. знищено</div></div>
            <div id="col-right"></div>
        </div>
    </div>

    <script>
        let allData = [];
        const ukMonths = ["Січень", "Лютий", "Березень", "Квітень", "Травень", "Червень", 
                         "Липень", "Серпень", "Вересень", "Жовтень", "Листопад", "Грудень"];
        const currentMonthName = ukMonths[new Date().getMonth()];

        function updateClock() {
            const now = new Date();
            const days = ['Нд','Пн','Вт','Ср','Чт','Пт','Сб'];
            document.getElementById('header-time').textContent = 
                `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')} ${days[now.getDay()]}`;
            document.getElementById('header-date').textContent = 
                `${now.getDate().toString().padStart(2,'0')}.${(now.getMonth()+1).toString().padStart(2,'0')}.${now.getFullYear()}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        document.getElementById('current-month-display').textContent = currentMonthName;

        async function fetchStats() {
            const sheetId = '19JMsWCfWtKZ1bqISDD4WGfV9WUvAtZI8HEgfszI8UAk';
            const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

            try {
                const response = await fetch(url);
                const text = await response.text();
                const json = JSON.parse(text.substring(47).slice(0, -2));
                allData = json.table.rows;
                
                const selector = document.getElementById('period-selector');
                const monthsInSheet = [...new Set(allData.map(r => r.c[0] ? r.c[0].v : ''))]
                    .filter(m => m && m !== currentMonthName);

                monthsInSheet.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m; opt.textContent = m;
                    selector.appendChild(opt);
                });

                selector.addEventListener('change', (e) => renderStats(e.target.value));
                
                renderStats(currentMonthName);

            } catch (e) {
                document.getElementById('status-msg').innerText = 'ПОМИЛКА ДОСТУПУ';
            }
        }

        function renderStats(month) {
            const colL = document.getElementById('col-left');
            const colR = document.getElementById('col-right');
            colL.innerHTML = ''; colR.innerHTML = '';
            document.getElementById('status-msg').style.display = 'none';
            document.getElementById('main-wrapper').style.display = 'flex';

            const filtered = allData.filter(r => r.c[0] && r.c[0].v === month);
            const half = Math.ceil(filtered.length / 2);

            filtered.forEach((row, i) => {
                const label = row.c[1] ? row.c[1].v : '—';
                const hit = row.c[2] ? row.c[2].v : '0';
                const dest = row.c[3] ? row.c[3].v : '0';

                const html = `
                    <div class="data-row">
                        <div class="icon-cell">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent-cyan)" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/>
                            </svg>
                        </div>
                        <div class="label-cell">${label}</div>
                        <div class="value-cell val-total">${hit}</div>
                        <div class="value-cell val-destroyed">${dest}</div>
                    </div>`;
                if (i < half) colL.innerHTML += html; else colR.innerHTML += html;
            });
        }
        fetchStats();
    </script>
</body>
</html>
