<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗВІТ ББпС 125 ОВМБр</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #020606;
            --bg-block: #0d1212;
            --bg-hover: #161d1d;
            --accent-cyan: #00f2ff;
            --text-white: #ffffff;
            --row-border: #0a1111;
            --header-h: 77px; 
            --font-main: 31px;
            --font-blocks: 20px;
        }

        html, body {
            max-width: 100%;
            overflow-x: hidden;
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: 'Roboto Condensed', sans-serif;
            margin: 0;
            padding: 0;
        }

        body { display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        * { box-sizing: border-box; }

        /* --- HEADER --- */
        .top-nav {
            display: flex;
            align-items: stretch;
            background-color: var(--bg-dark);
            height: var(--header-h);
            width: 100%;
            border-bottom: 2px solid var(--row-border);
            padding: 0 20px;
            gap: 12px;
        }

        .nav-logo-section { display: flex; align-items: center; gap: 17px; padding-right: 22px; }
        .main-title { font-size: var(--font-main); text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; }
        .title-cyan { color: var(--accent-cyan); }

        .nav-blocks { display: flex; align-items: center; gap: 10px; flex-grow: 1; justify-content: flex-end; }

        .info-block {
            background-color: var(--bg-block);
            height: 55px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 28px;
            min-width: 132px;
            font-size: var(--font-blocks);
            border-radius: 2px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .info-block:hover { background-color: var(--bg-hover); }

        .time-date { color: var(--accent-cyan); font-size: 15.5px; line-height: 1.2; text-align: center; pointer-events: none; }

        /* --- СТИЛЬ ВИПАДАЮЧОГО СПИСКУ (ЯК НА СКРІНШОТІ) --- */
        .dropdown-wrapper { position: relative; padding: 0 !important; overflow: hidden; }

        .dropdown-wrapper select {
            background: var(--bg-block);
            border: none;
            color: white;
            font-family: inherit;
            font-size: var(--font-blocks);
            font-weight: 700;
            appearance: none;
            cursor: pointer;
            padding: 0 45px 0 28px;
            width: 100%;
            height: 100%;
            outline: none;
        }

        /* Стилізація пунктів меню (працює в більшості браузерів) */
        .dropdown-wrapper select option {
            background-color: var(--bg-block);
            color: white;
            padding: 15px;
            border-bottom: 1px solid var(--row-border);
        }

        .dropdown-wrapper select:hover { background-color: var(--bg-hover); }

        .dropdown-wrapper::after {
            content: "▼";
            font-size: 10px;
            color: #555;
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        /* --- ТАБЛИЦЯ --- */
        .stats-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            justify-content: center;
            max-width: 1300px;
            width: 100%;
            margin: 30px auto;
            padding: 0 20px;
        }

        .stats-column { flex: 1; min-width: 320px; max-width: 600px; }

        .table-header {
            display: grid;
            grid-template-columns: 1fr 150px;
            padding-bottom: 5px;
            border-bottom: 1px solid var(--row-border);
            color: var(--accent-cyan);
            font-size: 12px;
            text-transform: lowercase;
            text-align: right;
        }

        .data-row {
            display: grid;
            grid-template-columns: 40px 1fr 70px 70px;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--row-border);
        }

        .icon-cell { display: flex; justify-content: center; opacity: 0.7; }
        .label-cell { font-size: 15px; text-transform: uppercase; }
        .value-cell { text-align: center; font-size: 20px; font-weight: 700; }
        .val-total { color: #fff; }
        .val-destroyed { color: #7a8a8a; }

        #status-msg { text-align: center; padding: 50px; color: var(--accent-cyan); text-transform: uppercase; }

        @media (max-width: 950px) {
            .top-nav { height: auto; flex-direction: column; padding: 15px; gap: 10px; }
            .nav-blocks { width: 100%; justify-content: center; }
            .info-block { width: 100%; }
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="nav-logo-section">
            <svg width="35" height="35" viewBox="0 0 100 100" fill="white">
                <path d="M50 5L15 30V70L50 95L85 70V30L50 5ZM50 15L75 32V68L50 85L25 68V32L50 15Z"/>
            </svg>
            <div class="main-title">ЗВІТ <span class="title-cyan">УГРУПОВАННЯ СБС</span></div>
        </div>

        <div class="nav-blocks">
            <div class="info-block" onclick="renderAllTimeSum()">
                <div id="clock" class="time-date">--:--:-- --<br>--.--.----</div>
            </div>
            
            <div class="info-block" onclick="renderCurrentMonth()">
                <span id="month-label">Березень</span>
            </div>

            <div class="info-block dropdown-wrapper">
                <select id="period-select" onchange="renderData(this.value)">
                    <option value="" disabled selected>Минулий період</option>
                </select>
            </div>
        </div>
    </nav>

    <div id="status-msg">СИНХРОНІЗАЦІЯ...</div>

    <div class="stats-wrapper" id="main-wrapper" style="display: none;">
        <div class="stats-column">
            <div class="table-header"><div></div><div>уражено в т.ч. знищено</div></div>
            <div id="col-left"></div>
        </div>
        <div class="stats-column">
            <div class="table-header"><div></div><div>уражено в т.ч. знищено</div></div>
            <div id="col-right"></div>
        </div>
    </div>

    <script>
        const monthsNames = ["Січень", "Лютий", "Березень", "Квітень", "Травень", "Червень", "Липень", "Серпень", "Вересень", "Жовтень", "Листопад", "Грудень"];
        let allRowsData = [];
        const now = new Date();
        const currentMonthIdx = now.getMonth();
        const currentYear = now.getFullYear();
        const currentSearchString = `${monthsNames[currentMonthIdx]} ${currentYear}`;

        function updateClock() {
            const d = new Date();
            const days = ['Нд','Пн','Вт','Ср','Чт','Пт','Сб'];
            document.getElementById('clock').innerHTML = 
                `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}:${d.getSeconds().toString().padStart(2,'0')} ${days[d.getDay()]}<br>` +
                `${d.getDate().toString().padStart(2,'0')}.${(d.getMonth()+1).toString().padStart(2,'0')}.${d.getFullYear()}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function fetchData() {
            const sheetId = '19JMsWCfWtKZ1bqISDD4WGfV9WUvAtZI8HEgfszI8UAk';
            const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;
            document.getElementById('month-label').textContent = monthsNames[currentMonthIdx];

            try {
                const response = await fetch(url);
                const text = await response.text();
                const json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));
                allRowsData = json.table.rows;

                const select = document.getElementById('period-select');
                
                // Отримуємо унікальні періоди та фільтруємо МАЙБУТНІ
                const periods = [...new Set(allRowsData.map(r => r.c[0]?.v))].filter(p => {
                    if (!p) return false;
                    const [pMonth, pYear] = p.split(' ');
                    const pMonthIdx = monthsNames.indexOf(pMonth);
                    const pYearNum = parseInt(pYear);

                    // Умова: період не майбутній і не поточний (для списку "Минулі")
                    const isFuture = pYearNum > currentYear || (pYearNum === currentYear && pMonthIdx > currentMonthIdx);
                    const isCurrent = p === currentSearchString;
                    
                    return !isFuture && !isCurrent;
                });

                // Сортуємо за часом (спочатку новіші)
                periods.sort((a, b) => {
                    const [mA, yA] = a.split(' '); const [mB, yB] = b.split(' ');
                    return (parseInt(yB) - parseInt(yA)) || (monthsNames.indexOf(mB) - monthsNames.indexOf(mA));
                });

                periods.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p; opt.textContent = p; // p вже містить "Місяць Рік"
                    select.appendChild(opt);
                });

                renderCurrentMonth();
            } catch (e) {
                document.getElementById('status-msg').innerText = 'ПОМИЛКА ТАБЛИЦІ';
            }
        }

        function renderCurrentMonth() {
            renderData(currentSearchString);
            document.getElementById('period-select').selectedIndex = 0;
        }

        function renderAllTimeSum() {
            const summary = {};
            allRowsData.forEach(row => {
                const p = row.c[0]?.v;
                if (!p) return;
                
                // Перевірка на майбутні дати в сумі
                const [pMonth, pYear] = p.split(' ');
                const pMonthIdx = monthsNames.indexOf(pMonth);
                const pYearNum = parseInt(pYear);
                if (pYearNum > currentYear || (pYearNum === currentYear && pMonthIdx > currentMonthIdx)) return;

                const label = row.c[1]?.v;
                if (!label) return;
                if (!summary[label]) summary[label] = { hit: 0, dest: 0 };
                summary[label].hit += (parseInt(row.c[2]?.v) || 0);
                summary[label].dest += (parseInt(row.c[3]?.v) || 0);
            });

            const formattedRows = Object.keys(summary).map(key => ({
                c: [null, {v: key}, {v: summary[key].hit}, {v: summary[key].dest}]
            }));

            display(formattedRows, "ЗАГАЛЬНИЙ ЗВІТ");
        }

        function renderData(filterValue) {
            const filtered = allRowsData.filter(r => r.c[0]?.v === filterValue);
            display(filtered, filterValue);
        }

        function display(rows, title) {
            const colLeft = document.getElementById('col-left');
            const colRight = document.getElementById('col-right');
            const status = document.getElementById('status-msg');
            const wrapper = document.getElementById('main-wrapper');

            colLeft.innerHTML = ''; colRight.innerHTML = '';

            if (rows.length === 0) {
                status.style.display = 'block';
                status.innerText = `НЕМАЄ ДАНИХ: ${title}`;
                wrapper.style.display = 'none';
                return;
            }

            status.style.display = 'none';
            wrapper.style.display = 'flex';

            const half = Math.ceil(rows.length / 2);
            rows.forEach((row, index) => {
                const html = `
                    <div class="data-row">
                        <div class="icon-cell">🔘</div>
                        <div class="label-cell">${row.c[1]?.v || '—'}</div>
                        <div class="value-cell val-total">${row.c[2]?.v || '0'}</div>
                        <div class="value-cell val-destroyed">${row.c[3]?.v || '0'}</div>
                    </div>`;
                if (index < half) colLeft.innerHTML += html; else colRight.innerHTML += html;
            });
        }

        window.onload = fetchData;
    </script>
</body>
</html>
