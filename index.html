<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Звіт USB </title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #050a0a;
            --line-color: #1a2222;
            --accent-cyan: #00f2ff; /* Бірюзовий колір тексту як на скриншоті */
            --text-white: #ffffff;
            --text-gray: #b0b0b0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Roboto Condensed', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .stats-container {
            width: 100%;
            max-width: 600px; /* Ширина як у одного блоку на фото */
            border-top: 1px solid var(--line-color);
        }

        /* Заголовок таблиці */
        .stats-header {
            display: grid;
            grid-template-columns: 1fr 80px 80px;
            padding: 10px 5px;
            color: var(--accent-cyan);
            font-weight: bold;
            font-size: 14px;
            text-align: right;
            text-transform: lowercase;
        }

        .stats-header span:first-child {
            text-align: left;
        }

        /* Рядок статистики */
        .stats-row {
            display: grid;
            grid-template-columns: 1fr 80px 80px;
            align-items: center;
            padding: 12px 5px;
            border-bottom: 1px solid var(--line-color);
            transition: background 0.2s;
        }

        .stats-row:hover {
            background: rgba(0, 242, 255, 0.03);
        }

        /* Назва та "іконка" */
        .category-info {
            display: flex;
            align-items: center;
            text-align: left;
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .category-icon {
            width: 24px;
            height: 24px;
            margin-right: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Числа */
        .value-cell {
            text-align: right;
            font-size: 18px;
            font-weight: 700;
        }

        .value-total { color: var(--text-white); }
        .value-destroyed { color: var(--text-gray); }

        /* Лоадер */
        #loader {
            color: var(--accent-cyan);
            text-align: center;
            padding: 40px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="stats-container">
        <div class="stats-header">
            <span></span>
            <span>уражено</span>
            <span>в т.ч. знищено</span>
        </div>
        
        <div id="loader">ОТРИМАННЯ ДАНИХ...</div>
        <div id="stats-content"></div>
    </div>

    <script>
        async function loadStats() {
            const sheetId = '19JMsWCfWtKZ1bqISDD4WGfV9WUvAtZI8HEgfszI8UAk';
            const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

            try {
                const response = await fetch(url);
                const text = await response.text();
                const json = JSON.parse(text.substring(47).slice(0, -2));
                const rows = json.table.rows;
                
                const container = document.getElementById('stats-content');
                document.getElementById('loader').style.display = 'none';

                rows.forEach(row => {
                    // Припускаємо структуру таблиці: 
                    // A (c[0]) - Назва, B (c[1]) - Уражено, C (c[2]) - Знищено
                    const name = row.c[0] ? row.c[0].v : '—';
                    const hit = row.c[1] ? row.c[1].v : '0';
                    const destroyed = row.c[2] ? row.c[2].v : '0';

                    const rowHtml = `
                        <div class="stats-row">
                            <div class="category-info">
                                <div class="category-icon">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--accent-cyan)">
                                        <path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/>
                                    </svg>
                                </div>
                                ${name}
                            </div>
                            <div class="value-cell value-total">${hit}</div>
                            <div class="value-cell value-destroyed">${destroyed}</div>
                        </div>
                    `;
                    container.innerHTML += rowHtml;
                });
            } catch (e) {
                console.error(e);
                document.getElementById('loader').innerText = 'ПОМИЛКА ДОСТУПУ';
            }
        }

        window.onload = loadStats;
    </script>
</body>
</html>
