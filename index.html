<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗВІТ ББпС 125 ОВМБр</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #020606;
            --bg-block: #0d1212;
            --accent-cyan: #00f2ff;
            --text-white: #ffffff;
            --row-border: #0a1111;
        }

        html, body {
            max-width: 100%;
            overflow-x: hidden;
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: 'Roboto Condensed', sans-serif;
            margin: 0;
            padding: 0;
        }

        /* --- ВЕРХНЯ ПАНЕЛЬ (HEADER) --- */
        .top-nav {
            display: flex;
            align-items: stretch;
            background-color: var(--bg-dark);
            height: 70px;
            border-bottom: 2px solid var(--row-border);
            padding: 0 15px;
            gap: 10px;
        }

        .nav-logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
            padding-right: 20px;
        }

        .unit-logo {
            height: 40px;
            width: auto;
        }

        .main-title {
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .title-cyan { color: var(--accent-cyan); }

        /* Блоки справа */
        .nav-blocks {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-grow: 1;
            justify-content: flex-end;
        }

        .info-block {
            background-color: var(--bg-block);
            height: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 25px;
            min-width: 120px;
            font-size: 18px;
            text-transform: none;
            border-radius: 2px;
        }

        .time-date {
            color: var(--accent-cyan);
            font-size: 14px;
            line-height: 1.2;
            text-align: center;
        }

        /* Стилізація випадаючого списку */
        .dropdown-wrapper {
            position: relative;
            cursor: pointer;
        }

        .dropdown-wrapper select {
            background: transparent;
            border: none;
            color: white;
            font-family: inherit;
            font-size: 18px;
            font-weight: 700;
            appearance: none;
            cursor: pointer;
            padding-right: 20px;
            outline: none;
        }

        .dropdown-wrapper::after {
            content: "▼";
            font-size: 10px;
            color: #555;
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        /* --- СТАТИСТИКА --- */
        .stats-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            justify-content: center;
            max-width: 1300px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .stats-column {
            flex: 1;
            min-width: 320px;
            max-width: 600px;
        }

        .table-header {
            display: grid;
            grid-template-columns: 1fr 150px;
            padding-bottom: 5px;
            border-bottom: 1px solid var(--row-border);
            color: var(--accent-cyan);
            font-size: 12px;
            text-transform: lowercase;
            text-align: right;
        }

        .data-row {
            display: grid;
            grid-template-columns: 40px 1fr 70px 70px;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--row-border);
        }

        .icon-cell img { width: 24px; height: 24px; filter: brightness(0) saturate(100%) invert(84%) sepia(35%) font-size: 18px; }
        .label-cell { font-size: 15px; text-transform: uppercase; padding-left: 5px; }
        .value-cell { text-align: center; font-size: 20px; }
        .val-total { color: #fff; }
        .val-destroyed { color: #7a8a8a; }

        #status-msg { text-align: center; padding: 50px; color: var(--accent-cyan); letter-spacing: 2px; }

        @media (max-width: 900px) {
            .top-nav { height: auto; flex-direction: column; padding: 15px; }
            .nav-blocks { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="nav-logo-section">
            <svg width="30" height="30" viewBox="0 0 100 100" fill="white">
                <path d="M50 5L15 30V70L50 95L85 70V30L50 5ZM50 15L75 32V68L50 85L25 68V32L50 15Z"/>
            </svg>
            <div class="main-title">ЗВІТ <span class="title-cyan">ББпС 125 ОВМБр</span></div>
        </div>

        <div class="nav-blocks">
            <div class="info-block">
                <div id="clock" class="time-date">--:--:-- --<br>--.--.----</div>
            </div>
            <div class="info-block" id="current-month-label">Березень</div>
            <div class="info-block dropdown-wrapper">
                <select id="period-select">
                    <option value="" disabled selected>Минулий період</option>
                </select>
            </div>
        </div>
    </nav>

    <div id="status-msg">СИНХРОНІЗАЦІЯ...</div>

    <div class="stats-wrapper" id="main-wrapper" style="display: none;">
        <div class="stats-column">
            <div class="table-header"><div></div><div>уражено в т.ч. знищено</div></div>
            <div id="col-left"></div>
        </div>
        <div class="stats-column">
            <div class="table-header"><div></div><div>уражено в т.ч. знищено</div></div>
            <div id="col-right"></div>
        </div>
    </div>

    <script>
        const monthsNames = ["Січень", "Лютий", "Березень", "Квітень", "Травень", "Червень", "Липень", "Серпень", "Вересень", "Жовтень", "Листопад", "Грудень"];
        let allRowsData = [];

        // Годинник
        function updateTime() {
            const now = new Date();
            const days = ['Нд','Пн','Вт','Ср','Чт','Пт','Сб'];
            const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')} ${days[now.getDay()]}`;
            const dateStr = `${now.getDate().toString().padStart(2,'0')}.${(now.getMonth()+1).toString().padStart(2,'0')}.${now.getFullYear()}`;
            document.getElementById('clock').innerHTML = `${timeStr}<br>${dateStr}`;
        }
        setInterval(updateTime, 1000);
        updateTime();

        async function fetchData() {
            const sheetId = '19JMsWCfWtKZ1bqISDD4WGfV9WUvAtZI8HEgfszI8UAk';
            const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;
            
            const now = new Date();
            const currentMonthYear = `${monthsNames[now.getMonth()]} ${now.getFullYear()}`;
            document.getElementById('current-month-label').textContent = monthsNames[now.getMonth()];

            try {
                const response = await fetch(url);
                const text = await response.text();
                const json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));
                allRowsData = json.table.rows;

                // Заповнення випадаючого списку періодами (унікальні значення з колонки A)
                const periods = [...new Set(allRowsData.map(r => r.c[0] ? r.c[0].v : null))].filter(p => p && p !== currentMonthYear);
                const select = document.getElementById('period-select');
                periods.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p; opt.textContent = p;
                    select.appendChild(opt);
                });

                select.onchange = (e) => renderData(e.target.value);

                // Початковий рендер за поточний місяць
                renderData(currentMonthYear);

            } catch (e) {
                document.getElementById('status-msg').innerText = 'ПОМИЛКА ЗАВАНТАЖЕННЯ';
            }
        }

        function renderData(filter) {
            const colLeft = document.getElementById('col-left');
            const colRight = document.getElementById('col-right');
            colLeft.innerHTML = ''; colRight.innerHTML = '';

            const filtered = allRowsData.filter(r => r.c[0] && r.c[0].v === filter);
            
            if (filtered.length === 0) {
                document.getElementById('status-msg').style.display = 'block';
                document.getElementById('status-msg').innerText = `НЕМАЄ ДАНИХ ЗА ${filter.toUpperCase()}`;
                document.getElementById('main-wrapper').style.display = 'none';
                return;
            }

            document.getElementById('status-msg').style.display = 'none';
            document.getElementById('main-wrapper').style.display = 'flex';

            const half = Math.ceil(filtered.length / 2);
            filtered.forEach((row, index) => {
                const html = `
                    <div class="data-row">
                        <div class="icon-cell">🔘</div>
                        <div class="label-cell">${row.c[1]?.v || '—'}</div>
                        <div class="value-cell val-total">${row.c[2]?.v || '0'}</div>
                        <div class="value-cell val-destroyed">${row.c[3]?.v || '0'}</div>
                    </div>`;
                if (index < half) colLeft.innerHTML += html; else colRight.innerHTML += html;
            });
        }

        window.onload = fetchData;
    </script>
</body>
</html>
